    <line x1="70" y1="186" x2="150" y2="106" />
    <path d="M 145 101 L 175 131 L 185 121 L 135 71 L 125 81 Z" />
    <path d="M 60 176 L 80 196" />
  </g>

  <!-- Сама зеленая лопата -->
  <g stroke="#42c864" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Черенок -->
    <line x1="70" y1="186" x2="150" y2="106" />
    <!-- Лезвие (штык) лопаты -->
    <path d="M 145 101 L 175 131 L 185 121 L 135 71 L 125 81 Z" fill="#1e1f22"/>
    <!-- Ручка -->
    <path d="M 60 176 L 80 196" />
